/* loadable modules */
modules {
    // Core modules are auto-loaded from <dpath>/modules/core/ and cannot
    // be unloaded.  They include: m_privmsg, m_away, m_wallops, m_who,
    // m_gossip, m_gossip_eventlog, m_legacy_bridge.

    // Extra modules live in the path below and must be explicitly loaded.
    // All modules support hot-reload:  /MODULE RELOAD <name>
    path    modules/extra;

    // IRCv3 capabilities (recommended)
    autoload m_away_notify;
    autoload m_account_notify;
    autoload m_account_tag;
    autoload m_batch;
    autoload m_bot_mode;
    autoload m_chathistory;
    autoload m_chghost;
    autoload m_echo_message;
    autoload m_extended_join;
    autoload m_invite_notify;
    autoload m_labeled_response;
    autoload m_monitor;
    autoload m_msgid;
    autoload m_server_time;
    autoload m_setname;
    autoload m_tagmsg;
    autoload m_userhost_in_names;

    // Authentication & TLS
    autoload m_sasl;
    autoload m_account_cmds;
    autoload m_starttls;
    autoload m_tls_tag;

    // Sessions
    autoload m_session;

    // WebSocket / WEBIRC gateway support
    autoload m_webirc;
};
